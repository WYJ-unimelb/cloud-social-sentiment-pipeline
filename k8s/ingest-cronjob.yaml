apiVersion: batch/v1
kind: CronJob
metadata:
  name: comp90024-ingestion-cronjob
spec:
  # Run once per day. Change to "*/10 * * * *" temporarily for quick testing.
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: gitlab-registry-secret
          containers:
            - name: comp90024-ingestion
              image: registry.gitlab.unimelb.edu.au:5005/chenxuanjin/comp90024_team_8/yaojinw-main-patch-25838:latest
              imagePullPolicy: Always
              command: ["python"]
              args: ["backend/ingest_real_data.py"]
              env:
                - name: ES_URL
                  value: "http://elasticsearch:9200"
                - name: MASTODON_CLIENTCRED_FILE
                  value: "/app/mastodon_clientcred.secret"
                - name: MASTODON_USERCRED_FILE
                  value: "/app/mastodon_usercred.secret"
              volumeMounts:
                - name: mastodon-credentials
                  mountPath: /app/mastodon_clientcred.secret
                  subPath: mastodon_clientcred.secret
                  readOnly: true
                - name: mastodon-credentials
                  mountPath: /app/mastodon_usercred.secret
                  subPath: mastodon_usercred.secret
                  readOnly: true
          volumes:
            - name: mastodon-credentials
              secret:
                secretName: mastodon-credentials
